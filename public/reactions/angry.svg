<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#F0803C"/>
      <stop offset="100%" stop-color="#DD3B0F"/>
    </radialGradient>
  </defs>
  <!-- Face circle - orange/red angry -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Left angry eyebrow - V shape going down to center -->
  <path d="M14 22l12 5" stroke="#65471B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right angry eyebrow -->
  <path d="M50 22l-12 5" stroke="#65471B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="22" cy="32" rx="3.5" ry="3.5" fill="white"/>
  <circle cx="22" cy="32.5" r="2.5" fill="#65471B"/>
  <!-- Right eye -->
  <ellipse cx="42" cy="32" rx="3.5" ry="3.5" fill="white"/>
  <circle cx="42" cy="32.5" r="2.5" fill="#65471B"/>
  <!-- Mouth - tight angry frown -->
  <path d="M22 46c0 0 4-5 10-5s10 5 10 5" stroke="#65471B" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- Nostrils -->
  <circle cx="30" cy="40" r="1" fill="#65471B" opacity="0.5"/>
  <circle cx="34" cy="40" r="1" fill="#65471B" opacity="0.5"/>
</svg>
