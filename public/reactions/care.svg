<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FFE16E"/>
      <stop offset="100%" stop-color="#F7B708"/>
    </radialGradient>
  </defs>
  <!-- Face circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Shadow under face -->
  <ellipse cx="32" cy="58" rx="22" ry="3" fill="#D4960A" opacity="0.15"/>
  <!-- Left eye - happy closed -->
  <path d="M18 27c2-4 6-4 8 0" stroke="#65471B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Right eye - happy closed -->
  <path d="M38 27c2-4 6-4 8 0" stroke="#65471B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Blush left -->
  <ellipse cx="17" cy="32" rx="4" ry="2.5" fill="#F0946C" opacity="0.4"/>
  <!-- Blush right -->
  <ellipse cx="47" cy="32" rx="4" ry="2.5" fill="#F0946C" opacity="0.4"/>
  <!-- Mouth - gentle smile -->
  <path d="M24 36c0 0 3 5 8 5s8-5 8-5" stroke="#65471B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Heart being hugged -->
  <path d="M32 52c0 0-9-6-9-12c0-3.5 2.5-6 5.5-6c2 0 3 1.2 3.5 2.5c0.5-1.3 1.5-2.5 3.5-2.5c3 0 5.5 2.5 5.5 6c0 6-9 12-9 12z" fill="#E8453C"/>
  <!-- Hands hugging heart - left -->
  <path d="M20 38c0 0 2 6 8 10" stroke="#F7B708" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M20 38c0 0 2 6 8 10" stroke="#E8A30A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hands hugging heart - right -->
  <path d="M44 38c0 0-2 6-8 10" stroke="#F7B708" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M44 38c0 0-2 6-8 10" stroke="#E8A30A" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
