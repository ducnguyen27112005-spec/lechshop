<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FFE16E"/>
      <stop offset="100%" stop-color="#F7B708"/>
    </radialGradient>
  </defs>
  <!-- Face circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Left eyebrow - worried -->
  <path d="M15 22c1-3 7-5 10-1" stroke="#65471B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Right eyebrow - worried -->
  <path d="M49 22c-1-3-7-5-10-1" stroke="#65471B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Left eye -->
  <ellipse cx="21" cy="30" rx="4.5" ry="5" fill="white"/>
  <circle cx="21" cy="31" r="3" fill="#65471B"/>
  <circle cx="19.8" cy="29.5" r="1" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="43" cy="30" rx="4.5" ry="5" fill="white"/>
  <circle cx="43" cy="31" r="3" fill="#65471B"/>
  <circle cx="41.8" cy="29.5" r="1" fill="white"/>
  <!-- Tear drop on right cheek -->
  <path d="M48 34c0 0 2 4 2 6c0 2-1.5 3-3 3s-3-1-3-3c0-2 4-6 4-6z" fill="#5DADEC"/>
  <!-- Mouth - sad frown -->
  <path d="M23 44c0 0 4-4 9-4s9 4 9 4" stroke="#65471B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
