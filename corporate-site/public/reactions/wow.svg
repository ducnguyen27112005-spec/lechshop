<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#FFE16E"/>
      <stop offset="100%" stop-color="#F7B708"/>
    </radialGradient>
  </defs>
  <!-- Face circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Left eyebrow raised -->
  <path d="M15 18c2-5 8-5 10 0" stroke="#65471B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Right eyebrow raised -->
  <path d="M39 18c2-5 8-5 10 0" stroke="#65471B" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Left eye - big round -->
  <ellipse cx="21" cy="28" rx="5.5" ry="6" fill="white"/>
  <circle cx="21" cy="29" r="3.5" fill="#65471B"/>
  <circle cx="19.5" cy="27.5" r="1.2" fill="white"/>
  <!-- Right eye - big round -->
  <ellipse cx="43" cy="28" rx="5.5" ry="6" fill="white"/>
  <circle cx="43" cy="29" r="3.5" fill="#65471B"/>
  <circle cx="41.5" cy="27.5" r="1.2" fill="white"/>
  <!-- Mouth - big O shape -->
  <ellipse cx="32" cy="44" rx="7" ry="9" fill="#65471B"/>
  <ellipse cx="32" cy="42" rx="5.5" ry="4" fill="#E24B4B" opacity="0.6"/>
</svg>
